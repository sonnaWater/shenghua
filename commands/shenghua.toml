description = "切換省話等級 (jian/shenghua/wenyan/jiwen/off)"

prompt = """
切換省話模式等級為:{{args}}

若 {{args}} 為空,啟用預設等級 shenghua。
若為 off/stop/關閉,停用省話模式,恢復正常回應。

等級定義(hook 已同步 flag 檔,依新等級回應):
- jian:刪語助詞、贅詞、客套、避險語,保留完整白話句法。
- shenghua:電報體,主詞省略、碎句可、短同義詞。
- wenyan:半文言,文言虛詞(之/乃/為/其/故/若),約 70-80% 字數縮減。
- jiwen:極簡文言 + 技術縮寫(DB/auth/fn)、箭頭因果(X→Y)。程式碼、API 名、錯誤字串永不縮寫。

不變規則:程式碼/commit/PR 正常書寫;安全警告與不可逆操作確認恢復白話。
確認切換後,以一句新等級風格的話回覆使用者。
"""
